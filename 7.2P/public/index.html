<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Socket Chat App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 60px auto;
      padding: 20px;
      background: #f0f4f8;
    }
    h1 { color: #1a3a5c; text-align: center; }
    #messages {
      list-style: none;
      padding: 0;
      margin: 20px 0;
      background: white;
      border-radius: 8px;
      min-height: 200px;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #ddd;
    }
    #messages li {
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
    }
    #messages li:last-child { border-bottom: none; }
    #form {
      display: flex;
      gap: 10px;
    }
    #input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
    }
    button {
      padding: 10px 20px;
      background: #0284c7;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }
    button:hover { background: #0369a1; }
  </style>
</head>
<body>
  <h1>💬 Live Chat</h1>
  <ul id="messages"></ul>
  <div id="form">
    <input id="input" type="text" placeholder="Type a message..." autocomplete="off"/>
    <button id="send-btn">Send</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="scripts.js"></script>
</body>
</html>
